<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — Expensely</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div class="brand">Expensely</div>
    <div class="sub">Create your account</div>

    <div class="auth-error" id="error-box"></div>

    <div class="field">
      <label for="name">Full name</label>
      <input type="text" id="name" placeholder="Your name">
    </div>
    <div class="field">
      <label for="email">Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="At least 6 characters">
    </div>
    <button class="btn btn-primary btn-full" onclick="handleRegister()">Create account</button>

    <div class="auth-switch">Already have an account? <a href="login.html">Log in</a></div>
  </div>
</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
</body>
</html>
